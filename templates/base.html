{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>ALON</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Oswald Font -->
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&display=swap" rel="stylesheet">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body>

<nav class="navbar navbar-expand-lg custom-navbar px-4">
    <a class="navbar-brand brand-logo" href="{% url 'home' %}">
        AL<span class="vinyl-mini"></span>N
    </a>

    <button class="navbar-toggler bg-light" type="button" data-bs-toggle="collapse" data-bs-target="#navbarMenu">
        <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse" id="navbarMenu">
        <div class="ms-auto d-flex gap-2 mt-3 mt-lg-0">
            <a href="{% url 'home' %}" class="btn nav-btn">Home</a>

            {% if user.is_authenticated %}
                <a href="{% url 'feed' %}" class="btn nav-btn">Create Post</a>
                <a href="{% url 'api_music_list' %}" class="btn nav-btn">Discover</a>
                <a href="{% url 'upload_track' %}" class="btn nav-btn-dark">Upload Music</a>
                <a href="{% url 'my_tracks' %}" class="btn nav-btn">My Tracks</a>
                <a href="{% url 'account_logout' %}" class="btn nav-btn-danger">Logout</a>
            {% else %}
                <a href="{% url 'account_login' %}" class="btn nav-btn">Login</a>
                <a href="{% url 'account_signup' %}" class="btn nav-btn-dark">Register</a>
            {% endif %}
        </div>
    </div>
</nav>

<main class="main-wrapper">
    {% block content %}
    {% endblock %}
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
