{% extends 'base.html' %}

{% block content %}

<section class="library-locked-page">

    <div class="library-locked-card">

        <div class="locked-icon">
            <span>✎</span>
        </div>

        <p class="small-label">Community Access</p>

        <h2>Login or register first</h2>

        <p>
            You need an account before you can create a community post.
            Please login or create an account to share music, playlists,
            and join the conversation.
        </p>

        <div class="locked-actions">
            <a href="{% url 'account_login' %}" class="btn alon-primary-btn">
                Login
            </a>

            <a href="{% url 'account_signup' %}" class="btn alon-outline-btn">
                Register
            </a>
        </div>

    </div>

</section>

{% endblock %}
