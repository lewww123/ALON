{% extends 'base.html' %}

{% block content %}
<h2>Upload Music</h2>

<div class="card bg-dark text-light">
    <div class="card-body">
        <form method="POST" enctype="multipart/form-data">
            {% csrf_token %}
            {{ form.as_p }}
            <button class="btn btn-warning">Upload Track</button>
        </form>
    </div>
</div>
{% endblock %}
